# ===================================================================
# GOOGLE OAUTH2 SOZLAMALARI
# ===================================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
# MUHIM: Googledan keyin qaytish manzili (Redirect URI)
spring.security.oauth2.client.registration.google.redirect-uri=https://volt-projects-production-e550.up.railway.app/login/oauth2/code/google


# ===================================================================
# POSTGRESQL MA'LUMOTLAR BAZASI SOZLAMALARI
# ===================================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# ===================================================================
# JPA / HIBERNATE SOZLAMALARI
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# ===================================================================
# RAILWAY PORT SOZLAMASI (MAJBURIY)
# ===================================================================
server.port=${PORT:8080}
