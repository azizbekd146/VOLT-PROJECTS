# ===================================================================
# GOOGLE OAUTH2 SOZLAMALARI
# ===================================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# MUHIM TAVSIYA: Spring Boot 3.x+ versiyalarida redirect-uri shablon (template) ko'rinishida yozilishi afzal.
# Spring buni o'zi avtomatik Railway domeningizga moslab oladi.
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google


# ===================================================================
# POSTGRESQL MA'LUMOTLAR BAZASI SOZLAMALARI
# ===================================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# ===================================================================
# JPA / HIBERNATE SOZLAMALARI
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# ===================================================================
# SERVER PORT SOZLAMASI
# ===================================================================
server.port=${PORT:8080}